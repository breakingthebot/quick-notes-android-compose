# Runs Android unit tests for every push and pull request.
# Connects to: Gradle wrapper, app module tests, and GitHub Actions.
# Created: 2026-07-03
name: Android CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

  ui-tests:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run Compose UI tests
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: arm64-v8a
          target: google_apis
          profile: pixel
          cores: 4
          emulator-boot-timeout: 900
          script: adb wait-for-device && until adb shell service check package | grep "found"; do sleep 5; done && ./gradlew connectedDebugAndroidTest
